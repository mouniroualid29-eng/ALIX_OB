<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALIX_OB | Official Site</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* إخفاء الماوس الأصلي */
        * { box-sizing: border-box; cursor: none !important; }
        
        body, html { 
            margin: 0; padding: 0; min-height: 100%; 
            background-color: #000; overflow-x: hidden; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            color: white; 
        }

        /* --- تأثير السيف والخط الأزرق --- */
        #sword-cursor {
            position: fixed; pointer-events: none; z-index: 9999;
            color: #5865F2; font-size: 30px;
            transform: translate(-20%, -20%) rotate(-45deg);
            filter: drop-shadow(0 0 10px #5865F2) drop-shadow(0 0 20px #fff);
            transition: transform 0.1s ease;
        }

        .sword-trail {
            position: fixed; width: 8px; height: 8px; background: #5865F2;
            border-radius: 50%; pointer-events: none; z-index: 9998;
            box-shadow: 0 0 15px #5865F2; animation: fadeOut 0.6s forwards;
        }

        @keyframes fadeOut { from { opacity: 1; transform: scale(1.2); } to { opacity: 0; transform: scale(0.2); } }

        /* --- الخلفية --- */
        #bg-video { 
            position: fixed; top: 50%; left: 50%; min-width: 100%; min-height: 100%; 
            z-index: 1; transform: translate(-50%, -50%); object-fit: cover; filter: brightness(0.3); 
        }

        .overlay { 
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            background: radial-gradient(circle, transparent 20%, #000 150%); 
        }

        /* --- شاشة الدخول --- */
        #enter-screen { 
            position: fixed; inset: 0; background: #000; 
            display: flex; align-items: center; justify-content: center; 
            z-index: 100; transition: 1s; 
        }
        #enter-screen h2 { color: #5865F2; letter-spacing: 5px; animation: pulse 2s infinite; }

        /* --- الحاوية الرئيسية --- */
        .container { 
            position: relative; z-index: 3; display: none; 
            flex-direction: column; align-items: center; 
            padding: 40px 20px; min-height: 100vh; justify-content: center;
        }

        /* --- صورة البروفيل والنيون --- */
        .profile-img { 
            width: 160px; height: 160px; border-radius: 50%; 
            border: 3px solid #5865F2; box-shadow: 0 0 25px #5865F2; 
            margin-bottom: 20px; object-fit: cover; transition: 0.5s;
        }
        .profile-img:hover { transform: scale(1.1) rotate(5deg); box-shadow: 0 0 50px #5865F2; }

        /* --- تأثير الجلتش للاسم --- */
        .glitch { 
            font-size: 4rem; font-weight: bold; text-transform: uppercase; 
            position: relative; text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00; 
            animation: glitch 725ms infinite; 
        }
        @keyframes glitch { 
            0% { text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00; }
            15% { text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00; }
            16% { text-shadow: -0.05em -0.025em 0 #00fffc, 0.025em 0.035em 0 #fc00ff, -0.05em -0.05em 0 #fffc00; }
            100% { text-shadow: -0.025em 0 0 #00fffc, 0.05em -0.025em 0 #fc00ff, -0.025em -0.05em 0 #fffc00; }
        }

        /* --- شريط الـ XP --- */
        .xp-container { width: 300px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 20px 0; overflow: hidden; border: 1px solid #5865F2; }
        .xp-bar { width: 0%; height: 100%; background: #5865F2; box-shadow: 0 0 15px #5865F2; transition: 3s ease-out; }

        /* --- تصميم البطاقات المطور --- */
        .stats-grid { display: flex; gap: 20px; margin-top: 30px; perspective: 1000px; }
        .stat-card {
            background: rgba(88, 101, 242, 0.05); padding: 20px; border-radius: 15px;
            border: 1px solid rgba(88, 101, 242, 0.3); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; align-items: center; width: 140px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .stat-card:hover { transform: translateY(-10px) rotateX(10deg); border-color: #5865F2; box-shadow: 0 10px 20px rgba(88, 101, 242, 0.3); }
        .stat-card i { color: #5865F2; font-size: 28px; margin-bottom: 10px; }
        .stat-card span { font-size: 0.9rem; font-weight: bold; letter-spacing: 1px; }

        /* --- التواصل الاجتماعي والعداد --- */
        .socials { display: flex; gap: 25px; margin: 30px 0; }
        .socials a { color: white; font-size: 30px; transition: 0.3s; }
        .socials a:hover { color: #5865F2; transform: scale(1.2); }

        #music-btn { position: fixed; top: 20px; right: 20px; z-index: 101; background: rgba(88, 101, 242, 0.2); border: 1px solid #5865F2; color: white; width: 45px; height: 45px; border-radius: 50%; display: none; align-items: center; justify-content: center; }
        
        .visitor-counter { margin-top: 20px; display: flex; flex-direction: column; align-items: center; }
        .visitor-counter img { height: 25px; filter: drop-shadow(0 0 5px #5865F2); }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="sword-cursor"><i class="fas fa-sword"></i></div>

    <div id="enter-screen" onclick="startApp()">
        <h2>[ انقر للدخول بالسيف ]</h2>
    </div>

    <button id="music-btn" onclick="toggleMusic()"><i id="m-icon" class="fas fa-pause"></i></button>

    <video loop id="bg-video"><source src="background.mp4" type="video/mp4"></video>
    <audio id="bg-music" loop><source src="music.mp3" type="audio/mpeg"></audio>
    <div class="overlay"></div>

    <div class="container" id="ui">
        <img src="profile.png" class="profile-img" alt="ALIX_OB">
        
        <div class="glitch">ALIX_OB</div>
        
        <div class="xp-container">
            <div class="xp-bar" id="xp-bar"></div>
        </div>
        <p style="font-size: 10px; color: #5865F2; letter-spacing: 3px; margin-bottom: 20px;">PRO GAMER LEVEL</p>

        <div class="stats-grid">
            <div class="stat-card"><i class="fas fa-gamepad"></i><span>Pro Player</span></div>
            <div class="stat-card"><i class="fas fa-microchip"></i><span>Ryzen 5</span></div>
            <div class="stat-card"><i class="fas fa-code"></i><span>FiveM Dev</span></div>
        </div>

        <div class="socials">
            <a href="https://www.tiktok.com/@alix_ob" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://www.tiktok.com/@alix_ob" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://discord.gg/9G6AYBPs" target="_blank"><i class="fab fa-discord"></i></a>
        </div>

        <div class="visitor-counter">
            <span style="color:#5865F2; font-size: 9px; letter-spacing: 2px;">VISITORS</span>
            <img src="https://profile-counter.glitch.me/ALIX_OB_PRO/count.svg" alt="Counter">
        </div>
    </div>

    <script>
        const sword = document.getElementById('sword-cursor');
        const music = document.getElementById("bg-music");

        // تحريك السيف والخط
        document.addEventListener('mousemove', (e) => {
            sword.style.left = e.clientX + 'px';
            sword.style.top = e.clientY + 'px';
            const trail = document.createElement('div');
            trail.className = 'sword-trail';
            trail.style.left = e.clientX + 'px';
            trail.style.top = e.clientY + 'px';
            document.body.appendChild(trail);
            setTimeout(() => { trail.remove(); }, 600);
        });

        // النقر بالسيف
        document.addEventListener('mousedown', () => {
            sword.style.transform = 'translate(-20%, -20%) rotate(-10deg) scale(1.3)';
        });
        document.addEventListener('mouseup', () => {
            sword.style.transform = 'translate(-20%, -20%) rotate(-45deg) scale(1)';
        });

        function startApp() {
            document.getElementById("bg-video").play();
            music.volume = 0.5;
            music.play();
            document.getElementById("enter-screen").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("enter-screen").style.display = "none";
                document.getElementById("ui").style.display = "flex";
                document.getElementById("music-btn").style.display = "flex";
                setTimeout(() => { document.getElementById("xp-bar").style.width = "90%"; }, 500);
            }, 1000);
        }

        function toggleMusic() {
            const icon = document.getElementById("m-icon");
            if (music.paused) { music.play(); icon.className = "fas fa-pause"; }
            else { music.pause(); icon.className = "fas fa-play"; }
        }
    </script>
</body>
</html>
